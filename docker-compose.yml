services:
  web:
    image: ${DOCKER_REGISTRY-}web
    build:
      context: .
      dockerfile: src/Web/Dockerfile
    env_file:
      - .env
    ports:
      - 5000:8080
      - 5001:8081
    environment:
    #  - OTEL_EXPORTER_OTLP_ENDPOINT=http://SORMAnalytics.seq:5341/ingest/otlp
    #  - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://SORMAnalytics.aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc

  SORMAnalytics.seq:
    image: datalust/seq:2024.3 # or latest
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - ./.containers/seq_data:/data
    ports:
      - 8080:80
      - 5341:5341
  
  SORMAnalytics.aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    environment:
        DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: true
    ports:
        - 18888:18888
        
  SORMAnalytics.database:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: SORMAnalyticsDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./.containers/SORMAnalytics_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    